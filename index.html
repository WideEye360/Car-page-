<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>360 Panorama</title>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<link href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" rel="stylesheet">
<style>
body { margin: 0; }
#panorama {
    width: 100vw;
    height: 100vh;
    position: relative;
    background: url('https://drive.google.com/uc?export=view&id=1591Yv-7w4Pzns_rEe477iIhQNmoqqvYV') center/cover no-repeat;
}

/* Ensure Pannellum canvas is above background */
.pannellum-container canvas {
    position: relative;
    z-index: 1;
}
</style>
</head>
<body>

<div id="panorama"></div>

<script>
pannellum.viewer('panorama', {
    "type": "equirectangular",
    "panorama": "https://drive.google.com/uc?export=view&id=1_hLAxJdo8zcM5IqNO3A3AthA2KSDgLbv",
    "autoLoad": true,
    "showLoader": false   // disables the "Loading..." overlay
});
</script>

</body>
</html>
